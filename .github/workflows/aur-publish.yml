name: AUR Publish

# Runs when you publish a release (move it out of draft).
# The PKGBUILD in aur/ is updated to the new version and pushed to AUR.
on:
  release:
    types: [published]

jobs:
  aur:
    name: Publish to AUR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Update PKGBUILD version
        run: |
          sed -i "s/^pkgver=.*/pkgver=${{ steps.version.outputs.version }}/" aur/PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" aur/PKGBUILD

      - name: Publish to AUR
        uses: KSXGitHub/github-actions-deploy-aur@v4.1.2
        with:
          pkgname: poe2-overlord-bin
          pkgbuild: aur/PKGBUILD
          commit_username: David Meents
          commit_email: dmeents@pm.me
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          allow_empty_commits: false
          force_push: false
