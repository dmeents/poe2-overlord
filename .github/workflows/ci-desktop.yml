name: CI Desktop

on:
  push:
    branches: [main]
    paths:
      - 'packages/backend/**'
      - 'packages/frontend/**'
      - 'packages/theme/**'
      - 'rust-toolchain.toml'
      - 'pnpm-lock.yaml'
      - 'package.json'
      - 'biome.json'
      - '.github/workflows/ci-desktop.yml'
  pull_request:
    branches: [main]
    paths:
      - 'packages/backend/**'
      - 'packages/frontend/**'
      - 'packages/theme/**'
      - 'rust-toolchain.toml'
      - 'pnpm-lock.yaml'
      - 'package.json'
      - 'biome.json'
      - '.github/workflows/ci-desktop.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-frontend:
    name: Lint & Typecheck Frontend + Theme
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @poe2-overlord/theme typecheck

      - run: pnpm --filter @poe2-overlord/frontend check:ci

      - run: pnpm --filter @poe2-overlord/frontend typecheck

  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @poe2-overlord/frontend test

  rust:
    name: Rust fmt + clippy + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            librsvg2-dev \
            libappindicator3-dev \
            libssl-dev \
            build-essential \
            pkg-config \
            file \
            mold \
            clang

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/backend -> target
          cache-on-failure: true

      - name: Check formatting
        working-directory: packages/backend
        run: cargo fmt -- --check

      - name: Clippy
        working-directory: packages/backend
        run: cargo clippy --all-targets --all-features

      - name: Test
        working-directory: packages/backend
        run: cargo test

      - name: Build check (release)
        working-directory: packages/backend
        run: cargo build --release --locked
